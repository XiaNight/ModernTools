name: Unit Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    # WPF / net8.0-windows assemblies require a Windows runner.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Tests/ModernTools.Tests/ModernTools.Tests.csproj

      - name: Test
        run: dotnet test Tests/ModernTools.Tests/ModernTools.Tests.csproj --configuration Release --no-restore --verbosity normal
